# Salesforce Health Cloud Connection Properties
# Copy this file and fill in your org credentials

sf.login.url=https://login.salesforce.com
sf.client.id=YOUR_CONNECTED_APP_CLIENT_ID
sf.client.secret=YOUR_CONNECTED_APP_CLIENT_SECRET
sf.username=YOUR_SALESFORCE_USERNAME
sf.password=YOUR_SALESFORCE_PASSWORD
sf.api.version=v59.0

# OAuth Endpoint
sf.oauth.token.url=https://login.salesforce.com/services/oauth2/token
sf.grant.type=password

# Health Cloud API Paths
sf.api.base.path=/services/data/v59.0
sf.sobject.path=/services/data/v59.0/sobjects
sf.query.path=/services/data/v59.0/query

# Portal Settings
portal.mock.data=true
portal.session.timeout.minutes=30
